<label>
  Button text
  <input id="sample-button-text" type="text" lwcl-config-key="buttonText" lwcl-default="Start" lwcl-check-regex="[A-Za-z0-9 _-]{1,32}">
</label>
<label>
  Repeat count
  <input id="sample-repeat-count" type="number" min="1" lwcl-config-key="repeatCount" lwcl-config-type="integer" lwcl-default="1" lwcl-check-regex="[0-9]+">
</label>
<label class="checkbox-label">
  <input id="sample-enabled" type="checkbox" lwcl-config-key="enabled" lwcl-default="true">
  Enabled
</label>
<script>
  window.registerLoupedeckAutoConfig("{{actionGuid}}");
</script>
