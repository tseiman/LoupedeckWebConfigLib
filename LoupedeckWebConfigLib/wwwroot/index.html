<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header>
      <h1>{{heading}}</h1>
    </header>

    <script>
      window.LoupedeckConfigBootstrap = {{configJson}};
    </script>
    <script src="/loupedeck-config.js"></script>

    <div id="plugin-settings">
{{pluginSettings}}
    </div>

    <div id="actions">
{{actions}}
    </div>

    <footer>
      <button id="reset-config" type="button" class="secondary">Reset</button>
      <button id="save-config" type="button">Save</button>
      <button id="save-close-config" type="button">Save &amp; Close</button>
      <span id="save-status" aria-live="polite"></span>
    </footer>
  </main>
</body>
</html>
