<label>
  Macro
  <select lwcl-config-key="macroIndex" lwcl-config-type="integer" lwcl-default=""></select>
</label>
<label>
  Button label
  <input lwcl-config-key="buttonLabel" lwcl-default="Run Macro" lwcl-check-regex="[A-Za-z0-9 _-]{1,32}">
</label>
<label>
  Repeat count
  <input type="number" min="1" lwcl-config-key="repeatCount" lwcl-config-type="integer" lwcl-default="1" lwcl-check-regex="[0-9]+">
</label>
<script>
  window.registerLoupedeckAutoConfig("{{actionGuid}}");
</script>
